<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: sans-serif;
      font-size: 13px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 15px;
    }
    label {
      display: block;
      margin-top: 12px;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
      padding: 6px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    textarea {
      height: 80px;
      resize: vertical;
    }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 8px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background-color: #1a73e8;
      color: white;
    }
    button:hover {
      background-color: #1557b0;
    }
    #feedback {
      margin-top: 8px;
      font-size: 12px;
      color: green;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h2>通知メッセージの設定</h2>
  <label>タイトル
    <input type="text" id="title" placeholder="今日はお休みです 🎉">
  </label>
  <label>本文
    <textarea id="message" placeholder="ゆっくりお過ごしください！"></textarea>
  </label>
  <button id="save">保存</button>
  <div id="feedback"></div>
  <script src="popup.js"></script>
</body>
</html>
